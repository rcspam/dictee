<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Parakeet NeMo - stylized parrot with audio waves -->
  <defs>
    <linearGradient id="pk-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#76b900"/>
      <stop offset="100%" stop-color="#558b2f"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="28" fill="url(#pk-g)" opacity="0.12"/>
  <!-- Parrot body (simplified) -->
  <g fill="#76b900" stroke="#558b2f" stroke-width="1">
    <!-- Head -->
    <circle cx="26" cy="24" r="10"/>
    <!-- Body -->
    <ellipse cx="28" cy="38" rx="12" ry="10"/>
    <!-- Tail -->
    <path d="M18,44 Q10,54 8,58 Q14,56 20,48" fill="#558b2f" stroke="none"/>
    <path d="M22,46 Q16,56 14,58 Q20,56 24,48" fill="#76b900" stroke="none"/>
  </g>
  <!-- Eye -->
  <circle cx="24" cy="22" r="2.5" fill="white"/>
  <circle cx="24.5" cy="21.5" r="1.2" fill="#333"/>
  <!-- Beak -->
  <path d="M34,22 Q38,24 36,28 Q34,26 32,26 Z" fill="#ff8f00" stroke="#e65100" stroke-width="0.5"/>
  <!-- Audio waves -->
  <g fill="none" stroke="#76b900" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <path d="M44,26 Q48,32 44,38"/>
    <path d="M49,22 Q55,32 49,42"/>
    <path d="M54,18 Q62,32 54,46"/>
  </g>
</svg>
